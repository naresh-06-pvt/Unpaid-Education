name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/Unpaid-Education
            git pull
            cd backend
            npm install
            pm2 restart unpaid-backend
            cd ../frontend
            npm install
            npm run build
            pm2 restart unpaid-frontend