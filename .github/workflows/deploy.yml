name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy project to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/Unpaid-Education
            git pull origin main

            cd backend
            npm install
            pm2 restart unpaid-backend

            cd ../frontend
            npm install
            npm run build
            pm2 restart unpaid-frontend

            pm2 save